<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connection Test Webapp</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Connection Test <span class="badge">v3</span></h1>
      <p class="subtitle">Use these checks to verify your local server and outbound connectivity.</p>

      <button id="runAllBtn" class="run-all">Run All Checks</button>

      <section class="card">
        <h2>Local API Health <span class="status" id="healthStatus"></span></h2>
        <button id="healthBtn">Test /api/health</button>
        <pre id="healthOutput">Waiting...</pre>
      </section>

      <section class="card">
        <h2>GitHub API Reachability <span class="status" id="githubStatus"></span></h2>
        <button id="githubBtn">Test /api/github</button>
        <pre id="githubOutput">Waiting...</pre>
      </section>

      <section class="card">
        <h2>Server Info <span class="status" id="serverinfoStatus"></span></h2>
        <button id="serverinfoBtn">Test /api/serverinfo</button>
        <pre id="serverinfoOutput">Waiting...</pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
