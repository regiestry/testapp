<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connection Test Webapp</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Connection Test</h1>
      <p class="subtitle">Use these checks to verify your local server and outbound connectivity.</p>

      <section class="card">
        <h2>Local API Health</h2>
        <button id="healthBtn">Test /api/health</button>
        <pre id="healthOutput">Waiting...</pre>
      </section>

      <section class="card">
        <h2>GitHub API Reachability</h2>
        <button id="githubBtn">Test /api/github</button>
        <pre id="githubOutput">Waiting...</pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
